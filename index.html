<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="惠惠狗日记">
    
    <title>惠惠狗在偷偷做什么！</title>
    
    <style>
        :root {
            --primary-color: #ff9a9e;
            --bg-color: #fdfbfb;
            --box-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            padding-bottom: 50px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .date-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        input[type="date"] {
            padding: 10px 15px;
            font-size: 16px;
            border: 2px solid var(--primary-color);
            border-radius: 20px;
            outline: none;
            background: var(--box-bg);
            color: var(--text-color);
            font-family: inherit;
        }

        .schedule-container {
            max-width: 500px;
            margin: 0 auto;
            background: var(--box-bg);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 10px 20px;
        }

        .time-slot {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px dashed #eee;
        }

        .time-slot:last-child {
            border-bottom: none;
        }

        .time-label {
            font-weight: bold;
            color: #666;
            width: 60px;
            flex-shrink: 0;
        }

        .action-input {
            flex-grow: 1;
            border: none;
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: background 0.3s;
        }

        .action-input:focus {
            background: #fff0f0;
        }

        .action-input::placeholder {
            color: #ccc;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🐶 惠惠狗在偷偷做什么！</h1>
        <p style="color: #888; font-size: 14px; margin: 0;">记录小狗的每日行踪</p>
    </div>

    <div class="date-container">
        <input type="date" id="date-picker">
    </div>

    <div class="schedule-container" id="schedule-container">
        </div>

    <div class="toast" id="toast">已自动保存 🐾</div>

    <script>
        const datePicker = document.getElementById('date-picker');
        const container = document.getElementById('schedule-container');
        const toast = document.getElementById('toast');
        let toastTimeout;

        // 获取当地时间的今天日期 (YYYY-MM-DD)
        function getLocalToday() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // 初始化日期选择器为今天
        datePicker.value = getLocalToday();

        // 加载指定日期的时间表
        function loadSchedule(date) {
            container.innerHTML = '';
            // 从手机本地存储中读取数据
            const data = JSON.parse(localStorage.getItem('huihui_dog_diary')) || {};
            const dayData = data[date] || {};

            // 循环生成 0 点 到 23 点
            for(let i = 0; i < 24; i++) {
                const timeStr = `${i.toString().padStart(2, '0')}:00`;
                
                const slot = document.createElement('div');
                slot.className = 'time-slot';
                
                const label = document.createElement('div');
                label.className = 'time-label';
                label.innerText = timeStr;

                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'action-input';
                input.placeholder = '惠惠狗在...';
                input.value = dayData[i] || ''; // 填入已保存的数据

                // 监听输入框失去焦点或按下回车的事件进行保存
                input.addEventListener('change', (e) => {
                    saveData(date, i, e.target.value);
                });

                slot.appendChild(label);
                slot.appendChild(input);
                container.appendChild(slot);
            }
        }

        // 保存数据到本地
        function saveData(date, hour, action) {
            const data = JSON.parse(localStorage.getItem('huihui_dog_diary')) || {};
            if(!data[date]) {
                data[date] = {};
            }
            data[date][hour] = action;
            localStorage.setItem('huihui_dog_diary', JSON.stringify(data));
            
            showToast();
        }

        // 提示保存成功
        function showToast() {
            toast.style.opacity = '1';
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.style.opacity = '0';
            }, 1500);
        }

        // 监听日期切换事件
        datePicker.addEventListener('change', (e) => {
            loadSchedule(e.target.value);
        });

        // 页面首次加载时渲染今天的时间表
        loadSchedule(datePicker.value);
    </script>
</body>
</html>
