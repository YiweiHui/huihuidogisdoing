<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="惠惠狗">
    <link rel="apple-touch-icon" href="image111.jpeg">
    <title>惠惠狗在偷偷做什么！</title>
    
    <style>
        :root {
            --primary-color: #ff9a9e;
            --bg-color: #fdfbfb;
            --box-bg: #ffffff;
            --text-color: #333333;
            --accent-color: #fff0f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            padding-bottom: 50px;
        }

        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.5s;
        }
        .loader-img { width: 120px; height: 120px; border-radius: 25px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); } 50% { transform: scale(1.05); } 100% { transform: scale(0.95); } }

        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 26px; color: var(--primary-color); margin: 10px 0 5px; }
        .header p { color: #888; font-size: 13px; margin: 0; }

        .status-dot {
            display: inline-block; width: 8px; height: 8px;
            background-color: #ccc; border-radius: 50%; margin-left: 5px;
            transition: background-color 0.3s;
        }
        .status-dot.online { background-color: #4CAF50; }

        .date-container { display: flex; justify-content: center; margin-bottom: 25px; }
        input[type="date"] {
            padding: 12px 18px; font-size: 16px;
            border: 2px solid var(--primary-color);
            border-radius: 25px; outline: none;
            background: var(--box-bg); color: var(--text-color);
            font-family: inherit; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .schedule-container {
            max-width: 500px; margin: 0 auto;
            background: var(--box-bg); border-radius: 20px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.06);
            padding: 15px 20px;
        }

        .time-slot {
            display: flex; align-items: flex-start;
            padding: 14px 0; border-bottom: 1px dashed #eee;
        }
        .time-slot:last-child { border-bottom: none; }
        .time-label { font-weight: bold; color: #666; width: 60px; flex-shrink: 0; margin-top: 10px; font-size: 14px; }

        .action-input {
            flex-grow: 1; border: none;
            background: #f8f9fa; 
            padding: 10px 15px; /* 稍微增加了内边距让视觉更圆润 */
            border-radius: 12px; font-size: 16px; outline: none;
            transition: background 0.3s, box-shadow 0.3s;
            resize: none; 
            overflow: hidden;
            line-height: 1.5;
            font-family: inherit;
            /* 核心改进：设置一个最小高度，防止变扁 */
            min-height: 44px; 
            display: block;
            box-sizing: border-box;
        }
        .action-input:focus { background: var(--accent-color); box-shadow: 0 0 0 2px rgba(255,154,158,0.2); }

        .toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%); background: rgba(0, 0, 0, 0.75);
            color: white; padding: 12px 25px; border-radius: 25px;
            font-size: 15px; opacity: 0; transition: opacity 0.3s;
            pointer-events: none; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <img src="image111.jpeg" class="loader-img">
        <p style="color: #ff9a9e; margin-top: 15px; font-weight: bold; font-size: 18px;">正在同步北京时间...</p>
    </div>

    <div class="header">
        <div style="text-align: center; margin-bottom: 15px;">
            <img src="image111.jpeg" style="width: 90px; height: 90px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); object-fit: cover;">
        </div>
        <h1>🐶 惠惠狗在偷偷做什么！</h1>
        <p>当前同步：北京时间 <span class="status-dot" id="status-dot"></span></p>
    </div>

    <div class="date-container">
        <input type="date" id="date-picker">
    </div>

    <div class="schedule-container" id="schedule-container"></div>
    <div class="toast" id="toast">同步成功 ☁️🐾</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCU__iZvv2-ywIWo1inzs2tjE2Yvu5P4Sg",
            authDomain: "huihuidog-6c160.firebaseapp.com",
            projectId: "huihuidog-6c160",
            storageBucket: "huihuidog-6c160.firebasestorage.app",
            messagingSenderId: "59923454412",
            appId: "1:59923454412:web:6c652d94b4d9a6085de569",
            measurementId: "G-LJKZQ7TFZ6",
            databaseURL: "https://huihuidog-6c160-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const datePicker = document.getElementById('date-picker');
        const container = document.getElementById('schedule-container');
        const statusDot = document.getElementById('status-dot');

        function getBeijingDateString() {
            const formatter = new Intl.DateTimeFormat('zh-CN', {
                timeZone: 'Asia/Shanghai', year: 'numeric', month: '2-digit', day: '2-digit'
            });
            const parts = formatter.formatToParts(new Date());
            const dateObj = {};
            parts.forEach(p => dateObj[p.type] = p.value);
            return `${dateObj.year}-${dateObj.month}-${dateObj.day}`;
        }

        datePicker.value = getBeijingDateString();

        function autoResize(el) {
            el.style.height = '44px'; // 先恢复到最小高度
            if (el.scrollHeight > 44) {
                el.style.height = el.scrollHeight + 'px';
            }
        }

        function createUI() {
            container.innerHTML = '';
            for(let i = 0; i < 24; i++) {
                const slot = document.createElement('div');
                slot.className = 'time-slot';
                slot.innerHTML = `<div class="time-label">${i.toString().padStart(2, '0')}:00</div>
                                  <textarea class="action-input" placeholder="惠惠狗在..." id="hour-${i}" rows="1"></textarea>`;
                container.appendChild(slot);
                
                const textarea = slot.querySelector('textarea');
                textarea.addEventListener('input', () => autoResize(textarea));
                textarea.addEventListener('change', (e) => {
                    set(ref(db, `huihui_diary/${datePicker.value}/${i}`), e.target.value);
                    const toast = document.getElementById('toast');
                    toast.style.opacity = '1';
                    setTimeout(() => { toast.style.opacity = '0'; }, 1500);
                });
            }
        }

        function listen(date) {
            onValue(ref(db, `huihui_diary/${date}`), (snapshot) => {
                const data = snapshot.val() || {};
                for(let i = 0; i < 24; i++) {
                    const el = document.getElementById(`hour-${i}`);
                    if (document.activeElement !== el) {
                        el.value = data[i] || '';
                        autoResize(el);
                    }
                }
                statusDot.classList.add('online');
            });
        }

        datePicker.addEventListener('change', () => { createUI(); listen(datePicker.value); });

        createUI();
        listen(datePicker.value);

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0'; 
                setTimeout(() => document.getElementById('loading-screen').style.display='none', 500);
            }, 800);
        });
    </script>
</body>
</html>
