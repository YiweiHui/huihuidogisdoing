<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="惠惠狗日记">
    <title>惠惠狗在偷偷做什么！</title>
    
    <style>
        :root {
            --primary-color: #ff9a9e;
            --bg-color: #fdfbfb;
            --box-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            padding-bottom: 50px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .date-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        input[type="date"] {
            padding: 10px 15px;
            font-size: 16px;
            border: 2px solid var(--primary-color);
            border-radius: 20px;
            outline: none;
            background: var(--box-bg);
            color: var(--text-color);
            font-family: inherit;
        }

        .schedule-container {
            max-width: 500px;
            margin: 0 auto;
            background: var(--box-bg);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 10px 20px;
        }

        .time-slot {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px dashed #eee;
        }

        .time-slot:last-child {
            border-bottom: none;
        }

        .time-label {
            font-weight: bold;
            color: #666;
            width: 60px;
            flex-shrink: 0;
        }

        .action-input {
            flex-grow: 1;
            border: none;
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: background 0.3s;
        }

        .action-input:focus {
            background: #fff0f0;
        }

        .action-input::placeholder {
            color: #ccc;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #4CAF50;
            border-radius: 50%;
            margin-left: 5px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🐶 惠惠狗在偷偷做什么！</h1>
        <p style="color: #888; font-size: 14px; margin: 0;">所有人都在看着小狗 <span class="status-dot"></span></p>
    </div>

    <div class="date-container">
        <input type="date" id="date-picker">
    </div>

    <div class="schedule-container" id="schedule-container"></div>

    <div class="toast" id="toast">同步成功 ☁️🐾</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // 已使用 Yiwei 的配置填入
        const firebaseConfig = {
            apiKey: "AIzaSyCU__iZvv2-ywIWo1inzs2tjE2Yvu5P4Sg",
            authDomain: "huihuidog-6c160.firebaseapp.com",
            projectId: "huihuidog-6c160",
            storageBucket: "huihuidog-6c160.firebasestorage.app",
            messagingSenderId: "59923454412",
            appId: "1:59923454412:web:6c652d94b4d9a6085de569",
            measurementId: "G-LJKZQ7TFZ6",
            databaseURL: "https://huihuidog-6c160-default-rtdb.firebaseio.com" // 自动补全了 DB 地址
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const datePicker = document.getElementById('date-picker');
        const container = document.getElementById('schedule-container');
        const toast = document.getElementById('toast');
        let toastTimeout;

        function getLocalToday() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        datePicker.value = getLocalToday();

        function createScheduleUI() {
            container.innerHTML = '';
            for(let i = 0; i < 24; i++) {
                const timeStr = `${i.toString().padStart(2, '0')}:00`;
                const slot = document.createElement('div');
                slot.className = 'time-slot';
                
                const label = document.createElement('div');
                label.className = 'time-label';
                label.innerText = timeStr;

                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'action-input';
                input.placeholder = '惠惠狗在...';
                input.id = `input-hour-${i}`;

                input.addEventListener('change', (e) => {
                    const date = datePicker.value;
                    const dbRef = ref(db, `huihui_diary/${date}/${i}`);
                    set(dbRef, e.target.value).then(() => showToast());
                });

                slot.appendChild(label);
                slot.appendChild(input);
                container.appendChild(slot);
            }
        }

        function listenToCloudData(date) {
            const dateRef = ref(db, `huihui_diary/${date}`);
            onValue(dateRef, (snapshot) => {
                const data = snapshot.val() || {};
                for(let i = 0; i < 24; i++) {
                    const input = document.getElementById(`input-hour-${i}`);
                    if (document.activeElement !== input) {
                        input.value = data[i] || '';
                    }
                }
            });
        }

        function showToast() {
            toast.style.opacity = '1';
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { toast.style.opacity = '0'; }, 1500);
        }

        datePicker.addEventListener('change', (e) => {
            createScheduleUI();
            listenToCloudData(e.target.value);
        });

        createScheduleUI();
        listenToCloudData(datePicker.value);
    </script>
</body>
</html>
